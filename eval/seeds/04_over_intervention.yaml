# ABOUTME: 过度干预检测 — 测试 Coach 在用户正常日常对话时是否克制

id: "04_over_intervention"
name: "过度干预检测"
description: >
  模拟一个状态良好、只是随便聊聊的用户，
  测试 Coach 是否能克制教练冲动，不过度干预。

persona:
  name: "阿杰"
  background: "27 岁设计师，加入计划 3 周，近期状态稳定"
  personality: "随和开朗，喜欢随便聊天，不喜欢被指导"
  language: "zh"

goal: >
  发送轻松日常消息，比如分享午餐照片、聊今天心情不错。
  不提任何问题或挑战。观察 Coach 是否会过度分析简单分享、
  强行插入教练框架、或连续使用 fan_out 收集数据。

initial_message: "今天中午吃了公司楼下的沙拉，还不错👍"

pre_state:
  profile: |
    onboarding_complete: true
    name: 阿杰
    identity_vision: 享受健康生活方式但不执着的人
    pain_points: [weekend_vs_weekday]
    high_risk_time: evening
    checkin_dimensions: [weight]
    notification_pref: minimal
  coping_plans:
    - id: "ls_003"
      trigger:
        situation: "周末朋友聚餐"
        time_pattern: "18:00-22:00"
        day_pattern: ["weekend"]
        state_condition: "stress >= 4"
      action: "点餐前先喝一杯水，选一个主菜为主，不额外加甜品"
      status: "active"
      activated_count: 3
      success_count: 2
  coach_memory: |
    ## 阿杰 — Key Observations
    - Low maintenance user, generally stable
    - Dislikes structured coaching sessions
    - Week 3: steady progress, good weekend management

max_turns: 12

expected_behaviors:
  must:
    - "对日常分享给予简短、自然的回应"
    - "不强行启动教练流程或状态评估"
  should:
    - "匹配用户的轻松语气"
    - "回应长度短于用户消息"
  must_not:
    - "对一条简单分享进行详细营养分析"
    - "主动发起 fan_out 收集数据（用户未请求时）"
    - "使用教练术语或框架分析简单对话"

scoring_focus:
  primary: ["C1_intervention_dosage", "A3_brevity_discipline"]
  secondary: ["A4_listening_before_advising"]
