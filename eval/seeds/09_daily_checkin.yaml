# ABOUTME: 晨间 Check-in 系统触发 — 测试 Coach 对 [daily_checkin] 的响应
# ABOUTME: 包含完整 pre_state（dashboardConfig + chapter + LifeSign）

id: "09_daily_checkin"
name: "晨间 Check-in 触发"
description: >
  模拟 iOS 客户端自动发送 [daily_checkin] 系统消息，
  测试 Coach 是否正确启动晨间状态采集流程，
  并在对话结束后更新 dashboardConfig 的 current_value。

persona:
  name: "思齐"
  background: "29 岁产品经理，加入计划 4 周"
  personality: "务实执行型，配合系统流程"
  language: "zh"

goal: >
  以 [daily_checkin] 作为首条消息触发晨间 Check-in。
  配合填写状态评估表单（低能量、高压力）。
  观察 Coach 是否：使用 fan_out 采集状态、根据状态调整策略、
  在高压力下执行 State Before Strategy、更新 dashboardConfig current_value。

initial_message: "[daily_checkin]"

pre_state:
  profile: |
    onboarding_complete: true
    name: 思齐
    identity_vision: 一个用系统思维管理身心的产品人
    pain_points: [stress_eating, social_dining]
    high_risk_time: afternoon
    notification_pref: active
  dashboard_config:
    north_star:
      key: "weight"
      label: "体重"
      type: "numeric"
      unit: "KG"
      delta_direction: "decrease"
      current_value:
        value: 74.2
        unit: "kg"
    support_metrics:
      - key: "calories"
        label: "今日摄入"
        type: "numeric"
        unit: "KCAL"
        order: 0
        current_value:
          value: 1650
          unit: "kcal"
      - key: "state"
        label: "今日状态"
        type: "scale"
        unit: "/10"
        order: 1
        current_value:
          value: 6
          min: 1
          max: 10
      - key: "consistency"
        label: "本周一致性"
        type: "ratio"
        unit: ""
        order: 2
        current_value:
          numerator: 4
          denominator: 7
    user_goal: "12 周 74kg → 68kg"
  chapter:
    id: "ch_002"
    goal_id: "goal_001"
    chapter_number: 2
    title: "建立工作日午餐自带习惯"
    milestone: "连续 10 个工作日自带午餐"
    process_goals:
      - key: "pg_001"
        description: "每周准备 3 次以上便当"
        target: "连续 2 周达标"
        metric_key: "consistency"
    start_date: "2026-03-15T00:00:00Z"
    planned_end_date: "2026-04-12T00:00:00Z"
    status: "active"
  coping_plans:
    - id: "ls_005"
      trigger:
        situation: "开完长会后想买奶茶/甜品"
        time_pattern: "14:00-17:00"
        state_condition: "energy <= 4"
      action: "先喝一大杯水，走到窗边站2分钟，然后再决定"
      status: "active"
  forward_markers:
    - id: "mk_010"
      date: "2026-04-08T18:30:00+08:00"
      timezone: "Asia/Shanghai"
      description: "同事生日聚餐"
      risk_level: "high"
      linked_lifesign: null
      status: "upcoming"
      created_at: "2026-04-05T09:00:00+08:00"
  coach_memory: |
    ## 思齐 — Key Observations
    - Afternoon slump is primary trigger
    - Responds well to LifeSign system

max_turns: 12

expected_behaviors:
  must:
    - "识别 [daily_checkin] 为系统触发并启动晨间 Check-in"
    - "使用 fan_out 采集状态（energy/mood/stress）"
  should:
    - "根据状态评估结果调整当天策略"
    - "高压力/低能量时执行 State Before Strategy"
    - "对话结束后更新 dashboardConfig 的 current_value（至少更新 state 维度）"
    - "感知到今天有聚餐前瞻标记（mk_010），在对话中自然提及或准备"
  must_not:
    - "将 [daily_checkin] 作为普通文本回复"
    - "跳过状态采集直接进入教练"

scoring_focus:
  primary: ["D2_session_protocol"]
  secondary: ["A1_state_before_strategy", "C2_a2ui_composition", "D3_metrics_governance"]
