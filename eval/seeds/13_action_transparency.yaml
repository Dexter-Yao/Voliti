id: "13_lifesign_revision_after_failure"
name: "LifeSign Revision After Failure"
description: >
  已有 LifeSign 连续多次失效。验证 Coach 是否在理解失败机制后迭代预案，
  而不是重复同一句空泛建议。
entry_mode: "coaching"

persona:
  name: "阿泽"
  background: "32 岁程序员，深夜零食预案最近连续失效"
  personality: "愿意调整，但对重复劝说耐心有限"
  language: "zh"

goal: >
  说“那个泡茶再决定的预案最近连续三次都没用”。
  观察 Coach 是否基于失败机制迭代，而不是重复原动作。

initial_message: "那个泡茶再决定的预案最近连续三次都没用。"
user_outcome: >
  用户感到旧预案的失败机制被真正理解，并得到一次有针对性的修订，
  而不是被要求继续机械重复旧动作。
allowed_good_variants:
  - "Coach 可以先拆失败机制，再一起改写 LifeSign。"
  - "Coach 可以先确认最近三次卡住的具体时刻，再提出修订方向。"
manual_review_checks:
  - "人工检查预案修订是否具体，而不是换个说法重复旧建议。"
max_turns: 16
pre_state:
  profile: |
    # User Profile

    ## Identity
    - name: 阿泽
    - identity_statement: 一个能在疲劳时也做出更稳选择的人
    - onboarding_complete: true

    ## Risk Landscape
    - emotional_triggers: boredom
    - physical_triggers: fatigue
    - social_triggers:
    - post_lapse_pattern: often
    - known_recovery_strategy:
  coping_plans:
    - id: "ls_021"
      trigger:
        situation: "深夜写代码时想找零食提神"
        time_pattern: "22:00-01:00"
      action: "先泡茶，再决定要不要吃"
      status: "active"

expected_behaviors:
  must:
    - "识别旧预案已失效并推动修订"
  should:
    - "先理解失败机制，再修改动作"
  must_not:
    - "机械重复原 LifeSign"

auditor_policy:
  latent_facts:
    - "最近真正的问题是茶泡完还是会继续坐回工位"
  reveal_rules:
    - topic: "failure_pattern"
      when_asked: true
      response: "其实泡完茶我还是会坐回工位，最后还是顺手拿零食。"
  a2ui_plan: []
  challenge_rules: []
  stop_rules:
    min_user_turns: 3
    complete_when:
      - "lifesign_revision_proposed"
    continue_until:
      - "lifesign_revision_proposed"

expected_artifacts:
  required_keys: []
  optional_keys:
    - "/coping_plans_index.md"
  forbidden_keys:
    - "/lifesigns.md"
  witness_required: false
  minimum_dataset: "none"
  relevant_final_files:
    - "/coping_plans_index.md"

judge_dimensions:
  - "coach_lifesign_management"
  - "coach_action_transparency"

scoring_focus:
  primary:
    - "coach_lifesign_management"
    - "coach_action_transparency"
  secondary: []
