id: "16_a2ui_reject_skip_resilience"
name: "A2UI Reject Skip Resilience"
description: >
  用户在结构化面板出现时选择 reject/skip。验证系统的 A2UI 协议仍然稳定，
  同时 Coach 能在用户不想填面板时自然切回对话，不把流程卡死。
entry_mode: "coaching"

persona:
  name: "Lynn"
  background: "26 岁广告从业者，今天不想填结构化面板，只想先说一句"
  personality: "状态不差，但对突然弹出的面板会有点抗拒"
  language: "zh"

goal: >
  使用日常触发语句进入，如果 Coach 弹出状态面板，就先 reject。
  之后观察它能否回到自然对话，而不是卡住。

initial_message: "[daily_checkin] 08:10"
max_turns: 14
pre_state:
  profile: |
    # User Profile

    ## Basics
    - name: Lynn
    - depth_choice: full
    - identity_statement: 一个会持续关注自己状态的人
    - onboarding_complete: true

expected_behaviors:
  must:
    - "A2UI reject/skip 后流程不崩"
    - "Coach 能自然切回文本对话"
  should:
    - "尊重用户此刻不想填面板，而不是强迫再次打开"
  must_not:
    - "A2UI 被 reject 后仍反复机械重发"

auditor_policy:
  latent_facts:
    - "其实她今天只是想先说一句昨晚没睡好"
  reveal_rules:
    - topic: "sleep"
      when_asked: true
      response: "昨晚没睡好，所以今天不太想先填那些。"
  a2ui_plan:
    - key: "energy"
      action: "reject"
      reason: "我今天先不想填面板"
  challenge_rules: []
  stop_rules:
    min_user_turns: 3
    complete_when:
      - "reject_recovered_to_text"
    continue_until:
      - "reject_recovered_to_text"

expected_artifacts:
  required_keys: []
  optional_keys: []
  forbidden_keys:
    - "/lifesigns.md"
  witness_required: false
  minimum_dataset: "none"

judge_dimensions:
  - "coach_intervention_dosage"
  - "coach_action_transparency"

scoring_focus:
  primary:
    - "contract_a2ui"
  secondary:
    - "coach_intervention_dosage"
