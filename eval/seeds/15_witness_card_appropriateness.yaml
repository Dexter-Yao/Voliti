id: "15_holiday_restart_fatigue"
name: "Holiday Restart Fatigue"
description: >
  节假日后连续几天脱轨，用户已经出现典型 restart fatigue。验证 Coach 是否用“继续接上”的恢复框架，
  而不是强化“从头开始”的心理负担。
entry_mode: "coaching"

persona:
  name: "Momo"
  background: "28 岁策划，假期后已经连续四天没拉回来，对‘再来一次’很疲惫"
  personality: "嘴上说想放弃，其实是在试探还能不能被接住"
  language: "zh"

goal: >
  明确表达“我知道怎么做，但想到又要从头来就更不想动了”。

initial_message: "我知道怎么做，但一想到又要从头来就更不想动了。"
max_turns: 16
pre_state:
  profile: |
    # User Profile

    ## Identity
    - name: Momo
    - identity_statement: 一个能在节奏被打断后继续接回来的人
    - onboarding_complete: true

    ## Risk Landscape
    - emotional_triggers: shame
    - physical_triggers: fatigue
    - social_triggers: holiday
    - post_lapse_pattern: often
    - known_recovery_strategy:
  briefing: |
    假期后已连续 4 天未恢复到稳定节奏，典型 restart fatigue 信号明显。

expected_behaviors:
  must:
    - "明确采用继续接上的恢复框架"
  should:
    - "降低重启成本，而不是要求用户一次回到理想状态"
  must_not:
    - "使用从头来、重新开始、不能再犯等放大羞耻的措辞"

auditor_policy:
  latent_facts:
    - "她真正害怕的是一旦认真开始又会失败"
  reveal_rules:
    - topic: "fear"
      when_asked: true
      response: "我不是不知道怎么做，我是怕认真开始以后又失败。"
  a2ui_plan: []
  challenge_rules: []
  stop_rules:
    min_user_turns: 3
    complete_when:
      - "restart_fatigue_reframed"
    continue_until:
      - "restart_fatigue_reframed"

expected_artifacts:
  required_keys: []
  optional_keys:
    - "/derived/briefing.md"
  forbidden_keys:
    - "/lifesigns.md"
  witness_required: false
  minimum_dataset: "none"

judge_dimensions:
  - "coach_recovery_framing"
  - "coach_state_before_strategy"

scoring_focus:
  primary:
    - "coach_recovery_framing"
  secondary:
    - "coach_state_before_strategy"
