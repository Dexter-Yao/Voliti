# ABOUTME: Witness Card 触发适当性 — 测试 Coach 在合适/不合适时刻的里程碑判断

id: "15_witness_card_appropriateness"
name: "Witness Card 触发适当性"
description: >
  模拟一个已完成 Onboarding 的用户，在日常对话中分享一些小成就和日常琐事。
  测试 Coach 是否只在真正的里程碑时刻触发 Witness Card，
  而非对每个正面分享都生成卡片。

persona:
  name: "小慧"
  background: "30 岁产品经理，加入计划 2 周，有几次 LifeSign 成功"
  personality: "积极分享、喜欢被认可，会主动报告进展"
  language: "zh"

goal: >
  先分享一些普通日常（"今天午饭吃了沙拉"），观察 Coach 是否克制不触发 Card。
  然后分享一个有意义的成就（"昨晚聚餐我选了气泡水，朋友们都没说什么！
  这是我第一次在社交场合拒绝酒"），观察 Coach 是否识别为里程碑并触发 Witness Card。

initial_message: "今天中午自己带了便当，感觉还不错"

pre_state:
  profile: |
    onboarding_complete: true
    name: 小慧
    identity_vision: 能自信管理社交场合饮食的人
    pain_points: [social_eating, late_night_snacking]
    high_risk_time: evening
    checkin_dimensions: [weight, energy]
    notification_pref: normal
  coping_plans:
    - id: "ls_010"
      trigger:
        situation: "聚餐场合有酒精"
        time_pattern: "18:00-23:00"
        day_pattern: ["any"]
        state_condition: "social_pressure >= 3"
      action: "点气泡水，不需要解释"
      status: "active"
      activated_count: 3
      success_count: 1
  coach_memory: |
    ## 小慧 — Key Observations
    - Social eating is her biggest challenge
    - Week 2: making progress with lunch prep
    - LifeSign ls_010 activated 3 times, 1 success so far

follow_up_messages:
  - "哦对了，昨晚跟大学同学聚餐，他们都在喝酒"
  - "我直接点了气泡水！他们问我为什么不喝，我说最近在调整作息。居然没人再问了"
  - "说实话之前一直很怕这种场合，但其实没那么难嘛"

max_turns: 18

expected_behaviors:
  must:
    - "对普通日常分享（带便当）给予简短自然回应，不触发 Witness Card"
    - "在用户分享有意义的社交场合成就后，识别为里程碑"
  should:
    - "在识别里程碑后委托 witness_card_composer 生成 Witness Card"
    - "Card 的 achievement_type 应为 explicit"
    - "Card 应关联 LifeSign ls_010"
  must_not:
    - "对带便当这种日常行为触发 Witness Card"
    - "在一次对话中触发多张 Witness Card"
    - "在用户还没讲完成就细节时就急着触发 Card"

scoring_focus:
  primary: ["C1_intervention_dosage", "A4_listening_before_advising"]
  secondary: ["C3_lifesign_integration"]
