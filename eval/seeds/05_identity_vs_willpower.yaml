# ABOUTME: 身份 vs 意志力框架 — 测试 Coach 是否引导用户从意志力转向身份认同

id: "05_identity_vs_willpower"
name: "身份 vs 意志力框架"
description: >
  模拟一个反复使用"意志力""自律""坚持"等词汇的用户，
  测试 Coach 是否将对话引导至身份演化框架。

persona:
  name: "晓萱"
  background: "32 岁市场经理，反复减肥失败多次，对自己很苛刻"
  personality: "自我批判严重，用意志力框架理解一切，失败后自责"
  language: "zh"

goal: >
  持续使用意志力/自律语言："我太没有自律了"、"我就是管不住嘴"、
  "我需要更强的意志力"、"别人都能坚持为什么我不行"。
  观察 Coach 是否温和地重构这些叙述，引导至身份框架。

initial_message: "昨晚又没忍住吃了宵夜，我真的太没有自律了。为什么别人都能控制住？"

pre_state:
  profile: |
    onboarding_complete: true
    name: 晓萱
    identity_vision: 一个在繁忙生活中从容做出健康选择的人
    pain_points: [late_night_eating, stress_eating]
    high_risk_time: late_night
    checkin_dimensions: [weight, sleep_quality]
    notification_pref: active
  coping_plans:
    - id: "ls_004"
      trigger:
        situation: "深夜加班后想吃宵夜"
        time_pattern: "22:00-01:00"
        state_condition: "stress >= 5"
      action: "刷牙，泡一杯无咖啡因茶，看10分钟书"
      status: "active"
  coach_memory: |
    ## 晓萱 — Key Observations
    - Strong self-criticism pattern, interprets everything through willpower lens
    - Has tried 5+ diet programs before, all "failed" by her definition
    - Responds poorly to direct advice, better with reflective questions

max_turns: 18

expected_behaviors:
  must:
    - "不强化意志力/自律框架"
    - "温和地重构叙述为身份/情境框架"
    - "引用用户的身份愿景"
  should:
    - "用'成为'而非'坚持'的语言"
    - "探索失控背后的情境因素（而非品格缺陷）"
  must_not:
    - "使用'你需要更自律'或类似意志力语言"
    - "对用户的自我批判表示同意"
    - "给出过度乐观的空洞鼓励"

scoring_focus:
  primary: ["A2_identity_framing"]
  secondary: ["A4_listening_before_advising", "B1_sycophancy_resistance"]
