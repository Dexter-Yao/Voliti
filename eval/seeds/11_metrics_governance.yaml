id: "11_onboarding_reentry_gap_fill"
name: "Onboarding Re-entry Gap Fill"
description: >
  用户从设置页重新进入 onboarding，且原画像存在明显空缺。验证 Coach 是否识别这是补采模式，
  只聚焦缺口而不是重启 onboarding。
entry_mode: "re_entry"

persona:
  name: "Tin"
  background: "27 岁运营，之前快速开始了，现在愿意补充更多信息"
  personality: "愿意继续，但不想再走一遍完整首启流程"
  language: "zh"

goal: >
  说明“我想补一下之前没说完的那些东西”。
  如果 Coach 还把自己当新用户，就不会主动兜底。

initial_message: "我想补一下之前没说完的那些信息。"
max_turns: 18
pre_state:
  profile: |
    # User Profile

    ## Basics
    - name: Tin
    - depth_choice: quick
    - identity_statement: 一个在忙的时候也会顾住自己的人
    - onboarding_complete: true

    ## Environment
    - primary_meal_source: delivery
    - available_options:
    - cooking_ability:

    ## Identity & Motivation
    - motivation_type:
    - motivation_intensity:
    - privacy_attitude:

    ## Habits
    - dietary_restrictions:
    - established_good_habits:
    - exercise_type_freq:
    - medical_boundaries:

    ## Rhythm
    - work_rhythm:
    - social_rhythm:

    ## Triggers
    - emotional_triggers: stress
    - physical_triggers:
    - social_triggers:
    - post_lapse_pattern:
    - known_recovery_strategy:

expected_behaviors:
  must:
    - "识别为 re-entry 补采，而不是新用户 onboarding"
    - "围绕画像缺口继续补充信息"
  should:
    - "解释补采会如何帮助后续 coaching 更贴合"
  must_not:
    - "重新要求用户做 full/quick 深度选择"

auditor_policy:
  latent_facts:
    - "目前主要是公司食堂和外卖混合"
  reveal_rules:
    - topic: "meal_source"
      when_asked: true
      response: "现在主要是公司食堂和外卖混合。"
    - topic: "work_rhythm"
      when_asked: true
      response: "工作日比较固定，但周末常常会临时社交。"
    - topic: "good_habits"
      when_asked: true
      response: "不喝含糖饮料这件事其实已经坚持蛮久了。"
  a2ui_plan: []
  challenge_rules: []
  stop_rules:
    min_user_turns: 3
    complete_when:
      - "profile_gaps_filled"
    continue_until:
      - "profile_gaps_filled"

expected_artifacts:
  required_keys:
    - "/profile/context.md"
  optional_keys: []
  forbidden_keys:
    - "/lifesigns.md"
  witness_required: false
  minimum_dataset: "none"
  relevant_final_files:
    - "/profile/context.md"

judge_dimensions:
  - "coach_continuity_memory_surfacing"
  - "coach_intervention_dosage"

scoring_focus:
  primary:
    - "contract_memory_protocol"
    - "contract_store_schema"
  secondary:
    - "coach_continuity_memory_surfacing"
