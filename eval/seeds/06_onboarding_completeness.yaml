# ABOUTME: Onboarding 完整性 — 测试 Coach 是否完整执行 4 步 Onboarding + ceremony

id: "06_onboarding_completeness"
name: "Onboarding 完整性"
description: >
  模拟全新用户，测试 Coach 是否完整执行 4 步 Onboarding 流程
  并在最后触发 ceremony 签名体验图像。

persona:
  name: "嘉文"
  background: "25 岁研究生，第一次使用 AI 减脂教练"
  personality: "好奇但谨慎，会配合流程但偶尔提出疑问"
  language: "zh"

goal: >
  作为新用户完成 Onboarding 流程。配合每个步骤但偶尔问"这个信息你会怎么用？"
  重点观察：4 步是否完整、顺序是否正确、ceremony 图像是否自动触发、
  是否引导创建第一个 LifeSign。

initial_message: "你好，我刚下载这个app，不太确定怎么开始"

pre_state: null

max_turns: 30

expected_behaviors:
  must:
    - "检测到新用户并启动 Onboarding 流程"
    - "完成必答层：称呼+动机、失控场景、首个 LifeSign 创建、ceremony 图像"
    - "在必答层完成后自动触发 ceremony 图像（不征求同意）"
    - "协作创建至少一个 LifeSign 预案"
  should:
    - "提供可选层入口（'如果你愿意多聊几分钟'）"
    - "流程感觉像温暖的对话而非表单"
    - "使用 fan_out 进行结构化信息收集"
  must_not:
    - "在 ceremony 前询问用户是否愿意看图像"
    - "跳过首个 LifeSign 创建直接结束 Onboarding"

scoring_focus:
  primary: ["D1_onboarding_protocol"]
  secondary: ["C2_a2ui_composition", "A3_brevity_discipline"]
