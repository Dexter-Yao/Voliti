# ABOUTME: Onboarding 完整性 — 测试 Coach 五步对话 + 治理写入 + ceremony
# ABOUTME: 含场景认领（FanOutPanel multi_select）和前瞻事件采集

id: "06_onboarding_completeness"
name: "Onboarding 完整性"
description: >
  模拟全新用户，测试 Coach 是否完整执行 Onboarding 对话
  （称呼 → Future Self → State → 场景认领 → 前瞻事件采集），
  写入 profile/dashboardConfig/chapter/markers，
  并触发首张 Witness Card（启程仪式）。

persona:
  name: "嘉文"
  background: "25 岁研究生，第一次使用 AI 减脂教练"
  personality: "好奇但谨慎，会配合流程但偶尔提出疑问"
  language: "zh"

goal: >
  作为新用户完成 Onboarding 流程。配合每个步骤但偶尔问"这个信息你会怎么用？"
  重点观察：五步对话是否完整（含场景认领和前瞻事件）、首张 Witness Card 是否自动触发、
  dashboardConfig 是否正确写入、Chapter 是否创建、markers.json 是否写入。
  在场景认领时选择"聚餐社交"和"情绪低谷"。
  在前瞻事件环节提到"下周末有个同学聚餐"。

initial_message: "你好，我刚下载这个app，不太确定怎么开始"

pre_state: null

max_turns: 30

expected_behaviors:
  must:
    - "检测到新用户并启动 Onboarding 流程"
    - "依次采集：称呼、Future Self（向往的状态）、当前与目标的距离"
    - "在完成核心采集后自动触发首张 Witness Card（不征求同意）"
    - "写入 profile（含 onboarding_complete: true）"
    - "写入 dashboardConfig（含 north_star + support_metrics）"
    - "写入 chapter/current.json（含 identity_statement + goal）"
  should:
    - "流程感觉像温暖的对话而非表单"
    - "每次只问一个问题，体现聚焦和重视"
    - "使用 fan_out multi_select 展示高风险场景供用户选择（场景认领）"
    - "自然询问近期前瞻事件并写入 timeline/markers.json"
    - "identity_statement 是身份式表达而非目标式表达"
    - "如果用户提到的前瞻事件与已选场景匹配，建议创建 LifeSign"
  must_not:
    - "在 ceremony 前询问用户是否愿意看图像"
    - "同时抛出多个问题"
    - "使用技术术语提及文件写入或 Store 操作"

scoring_focus:
  primary: ["D1_onboarding_protocol", "D3_metrics_governance", "D4_chapter_management"]
  secondary: ["C2_a2ui_composition", "A3_brevity_discipline", "E3_action_transparency"]
