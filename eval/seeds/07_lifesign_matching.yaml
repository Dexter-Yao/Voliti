# ABOUTME: LifeSign 匹配 — 测试 Coach 是否在匹配情境中引用已有预案

id: "07_lifesign_matching"
name: "LifeSign 匹配准确性"
description: >
  模拟用户报告与已有 LifeSign 高度匹配的情境，
  测试 Coach 是否主动引用预案并正确追踪激活。

persona:
  name: "思齐"
  background: "29 岁产品经理，加入计划 4 周，有 2 个活跃 LifeSign"
  personality: "务实执行型，喜欢结构化方案，愿意配合系统"
  language: "zh"

goal: >
  描述一个与已有 LifeSign 高度匹配的情境（下午开完会很累想喝奶茶）。
  观察 Coach 是否主动提到相关 LifeSign。
  然后报告成功执行了 LifeSign（没买奶茶，喝了水），
  观察 Coach 是否记录成功并给予适当肯定。

initial_message: "刚开完一个超长的产品评审会，好累，特别想去楼下买杯奶茶犒劳自己"

pre_state:
  profile: |
    onboarding_complete: true
    name: 思齐
    identity_vision: 一个用系统思维管理身心的产品人
    pain_points: [stress_eating, social_dining]
    high_risk_time: afternoon
    checkin_dimensions: [weight, sleep_quality, meal_plan]
    notification_pref: active
  coping_plans:
    - id: "ls_005"
      trigger:
        situation: "开完长会后想买奶茶/甜品"
        time_pattern: "14:00-17:00"
        state_condition: "energy <= 4"
      action: "先喝一大杯水，走到窗边站2分钟，然后再决定"
      status: "active"
      activated_count: 5
      success_count: 2
    - id: "ls_006"
      trigger:
        situation: "周五晚上与同事聚餐"
        time_pattern: "18:00-21:00"
        day_pattern: ["friday"]
        state_condition: "stress >= 4"
      action: "提前选好一个主菜，不看菜单上的甜品区"
      status: "active"
      activated_count: 3
      success_count: 2
  coach_memory: |
    ## 思齐 — Key Observations
    - Responds very well to LifeSign system, finds it useful
    - Afternoon slump + meeting fatigue is primary trigger
    - Has been showing steady improvement with LifeSign compliance
  ledger_entries:
    - date: "2026-04-03"
      time: "153000"
      type: "craving"
      data:
        ts: "2026-04-03T15:30:00+08:00"
        type: "craving"
        trigger: "开完项目评审会，很累想喝奶茶"
        intensity: 7
        action_taken: "喝了水，走到窗边站了2分钟"
        outcome: "冲动减弱，没买奶茶"
        evidence: "昨天下午开完会想喝奶茶，用了 LifeSign 的方法"
        tags: ["afternoon", "meeting_fatigue"]

max_turns: 14

expected_behaviors:
  must:
    - "主动引用 ls_005（开会后想买奶茶的 LifeSign）"
    - "在用户报告成功执行后给予适当肯定"
  should:
    - "追踪 LifeSign 激活（activated_count）"
    - "在用户成功执行后追踪成功次数（success_count）"
  must_not:
    - "忽略完全匹配的 LifeSign 情境"
    - "过度庆祝或使用啦啦队式鼓励"

scoring_focus:
  primary: ["C3_lifesign_integration"]
  secondary: ["A3_brevity_discipline", "C1_intervention_dosage"]
