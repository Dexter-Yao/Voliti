      - chapter_index: 2
        name: "巩固工作日并观察周末张力"
        why_this_chapter: "工作日已稳住，但周末还没有真正被纳入结构。"
        start_date: "2026-03-25"
        end_date: "2026-04-18"
        milestone: "用户能明确说出周末是当前主要边界"
        process_goals:
          - name: "记录天数"
            weekly_target_days: 5
            weekly_total_days: 7
            how_to_measure: "Coach 每日综合评估"
            examples: []
          - name: "工作日蛋白达标"
