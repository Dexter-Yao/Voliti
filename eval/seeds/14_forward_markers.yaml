id: "14_chapter_transition_and_identity_review"
name: "Chapter Transition And Identity Review"
description: >
  当前 Chapter 已基本完成，用户显式表达阶段变化。验证 Coach 是否执行 Chapter 过渡，
  更新阶段骨架，并评估是否需要同步 identity review。
entry_mode: "coaching"

persona:
  name: "志远"
  background: "35 岁技术总监，工作日节奏已明显稳定，现在想把重心转到周末"
  personality: "善于反思，也能接受结构变化"
  language: "zh"

goal: >
  说“工作日这套已经快变成本能了，我现在更想处理周末”。
  观察 Coach 是否识别为 Chapter transition，而不是继续按旧阶段说话。

initial_message: "工作日这套已经快变成本能了，我现在更想处理周末。"
user_outcome: >
  用户感到当前阶段已经被看见并被正式过渡到新的 Chapter，
  且明白这些结构变化为什么与自己下一阶段的问题相关。
allowed_good_variants:
  - "Coach 可以先命名 transition，再更新 Chapter。"
  - "Coach 可以先一起确认新阶段重心，再写入新的结构骨架。"
manual_review_checks:
  - "人工检查 Chapter transition 的解释是否有阶段感，而不是字段堆砌。"
max_turns: 18
pre_state:
  profile: |
    # User Profile

    ## Identity
    - name: 志远
    - identity_statement: 一个在工作日能做出清醒选择的人
    - onboarding_complete: true
  plan:
    plan_id: "plan_2026_03_01_transition_review"
    status: "active"
    version: 2
    predecessor_version: 1
    target_summary: "12 周内建立稳定减脂节奏"
    overall_narrative: "工作日已经逐步站稳，下一步要把真正容易失手的周末纳入结构。"
    started_at: "2026-03-01T00:00:00+08:00"
    planned_end_at: "2026-05-24T23:59:59+08:00"
    created_at: "2026-03-01T09:00:00+08:00"
    revised_at: "2026-04-11T09:00:00+08:00"
    target:
      metric: "weight_kg"
      baseline: 75.0
      goal_value: 70.0
      duration_weeks: 12
      rate_kg_per_week: 0.417
    chapters:
