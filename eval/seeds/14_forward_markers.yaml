  coach_memory: |
    # Coach Memory — 志远

    ## Verified Patterns
    - [04-10 confirmed] 工作日已明显稳定，真正的增长边界转向周末

    ## Hypotheses

    ## Coaching Notes
    - [04-11] 当他明确看到阶段变化时，很愿意接受新 Chapter 命名

    ## Claimed vs Revealed

expected_behaviors:
  must:
    - "识别 Chapter transition 信号"
    - "写出新的 Chapter 结构并说明阶段变化"
  should:
    - "评估 identity 是否需要同步更新"
  must_not:
    - "继续把用户困在旧 Chapter 话语里"

auditor_policy:
  latent_facts:
    - "周末最容易被朋友局带走"
  reveal_rules:
    - topic: "weekend_edge"
      when_asked: true
      response: "工作日已经比较稳了，但周末一有朋友局就很容易散掉。"
  a2ui_plan: []
  challenge_rules: []
  stop_rules:
    min_user_turns: 3
    complete_when:
      - "chapter_transition_completed"
    continue_until:
      - "chapter_transition_completed"

expected_artifacts:
  required_keys:
    - "/plan/current.json"
    - "/profile/dashboardConfig"
  optional_keys:
    - "/coach/AGENTS.md"
  forbidden_keys:
    - "/lifesigns.md"
    - "/goal/current.json"
    - "/chapter/current.json"
  witness_required: false
  minimum_dataset: "none"
  relevant_final_files:
    - "/plan/current.json"
    - "/profile/dashboardConfig"
    - "/profile/context.md"

judge_dimensions:
  - "coach_identity_language"
  - "coach_action_transparency"
  - "coach_intervention_dosage"

scoring_focus:
  primary:
    - "coach_action_transparency"
  secondary:
    - "contract_goal_chapter_alignment"
    - "coach_identity_language"
    - "coach_intervention_dosage"
