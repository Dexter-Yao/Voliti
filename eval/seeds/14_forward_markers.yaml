# ABOUTME: 前瞻标记写入与管理 — 测试 Coach 对用户提及的未来事件的时间轴感知
# ABOUTME: 覆盖标记创建、LifeSign 关联、状态更新（取消）

id: "14_forward_markers"
name: "前瞻标记写入与管理"
description: >
  模拟用户在日常对话中提及多个未来事件，
  测试 Coach 是否正确写入前瞻标记（JSON schema）、
  关联已有 LifeSign、并在事件取消时更新标记状态。

persona:
  name: "思齐"
  background: "29 岁产品经理，加入计划 4 周，有活跃 LifeSign"
  personality: "务实执行型，日程变动频繁"
  language: "zh"

goal: >
  1. 提到"下周三要出差两天"，观察 Coach 是否写入前瞻标记。
  2. 提到"周五晚上同事约了聚餐"，观察 Coach 是否写入并关联 ls_006。
  3. 然后说"出差取消了"，观察 Coach 是否更新标记状态为 cancelled。

initial_message: "下周有点忙，周三要出差两天，周五晚上同事还约了聚餐"

pre_state:
  profile: |
    onboarding_complete: true
    name: 思齐
    identity_vision: 一个用系统思维管理身心的产品人
    pain_points: [stress_eating, social_dining]
    high_risk_time: afternoon
    notification_pref: active
  coping_plans:
    - id: "ls_006"
      trigger:
        situation: "周五晚上与同事聚餐"
        time_pattern: "18:00-21:00"
        day_pattern: ["friday"]
        state_condition: "stress >= 4"
      action: "提前选好一个主菜，不看菜单上的甜品区"
      status: "active"
  coach_memory: |
    ## 思齐 — Key Observations
    - Afternoon slump is primary trigger
    - Social dining is secondary trigger
    - Responds well to LifeSign system
  dashboard_config:
    north_star:
      key: "weight"
      label: "体重"
      type: "numeric"
      unit: "KG"
      delta_direction: "decrease"
      current_value:
        value: 74.0
        unit: "kg"
    support_metrics:
      - key: "state"
        label: "今日状态"
        type: "scale"
        unit: "/10"
        order: 0
    user_goal: "12 周 74kg → 68kg"

max_turns: 16

expected_behaviors:
  must:
    - "将出差事件写入 timeline/markers.json（JSON schema 格式）"
    - "将聚餐事件写入 timeline/markers.json"
  should:
    - "聚餐标记的 linked_lifesign 字段关联 ls_006"
    - "在用户提到聚餐时主动引用 ls_006 的应对方案"
    - "出差取消后更新对应标记状态为 cancelled"
    - "标记包含 timezone 字段"
  must_not:
    - "忽略用户提到的未来事件不写标记"
    - "用 Coach 的语气催促用户提供更多日程信息"

scoring_focus:
  primary: ["C3_lifesign_integration"]
  secondary: ["E3_action_transparency", "A4_listening_before_advising"]
