        why_this_chapter: "先把工作日的基本盘站稳，后续周末调整才有参照。"
        start_date: "2026-03-01"
        end_date: "2026-03-24"
        milestone: "连续三周工作日记录与蛋白达标稳定"
        process_goals:
          - name: "记录天数"
            weekly_target_days: 5
            weekly_total_days: 7
            how_to_measure: "Coach 每日综合评估"
            examples: []
          - name: "工作日蛋白达标"
            weekly_target_days: 5
            weekly_total_days: 7
            how_to_measure: "Coach 结合工作日饮食情况综合评估"
            examples: []
          - name: "今日状态"
            weekly_target_days: 7
            weekly_total_days: 7
            how_to_measure: "Coach 每日收尾时做状态自评"
            examples: []
