id: "12_claimed_vs_revealed_memory_write"
name: "Claimed vs Revealed Memory Write"
description: >
  用户口头上声称“基本都自己做饭”，但继续对话后揭示现实里主要靠外卖。
  验证 Coach 是否把这种张力写入四分区记忆，而不是污染 profile。
entry_mode: "coaching"

persona:
  name: "Sumi"
  background: "30 岁市场经理，很在意自己在健康上的自我形象"
  personality: "一开始会把自己说得更理想化，细聊后会承认现实"
  language: "zh"

goal: >
  先说“我平时其实都自己做饭”，如果 Coach 继续问，再承认“最近大部分还是外卖”。

initial_message: "我平时其实都自己做饭，所以按理说不该这么乱。"
user_outcome: >
  用户感到自己的真实行为被温和澄清，同时清楚知道 Coach 如何处理这类记忆张力，
  而不是被当场戳穿或被写进错误的长期画像。
allowed_good_variants:
  - "Coach 可以先继续澄清最近实际行为，再解释会如何记录这类差异。"
  - "Coach 可以先承接自尊压力，再点出 claimed 与 revealed 的张力。"
manual_review_checks:
  - "人工检查澄清 claimed/revealed 时是否伤害用户自尊。"
max_turns: 16
pre_state:
  profile: |
    # User Profile

    ## Identity
    - name: Sumi
    - identity_statement: 一个会认真照顾自己的人
    - onboarding_complete: true

    ## Life Context
    - primary_meal_source: mixed

expected_behaviors:
  must:
    - "识别 claimed 与 revealed 的偏差"
    - "不要把这类观察错误写进 profile"
  should:
    - "在不戳破自尊的前提下继续澄清真实行为"
  must_not:
    - "直接改写 profile 把外卖行为当成稳定事实"

auditor_policy:
  latent_facts:
    - "最近两周其实 70% 都是外卖"
  reveal_rules:
    - topic: "reality"
      when_asked: true
      response: "如果说最近两周的话，其实大部分还是外卖。"
  a2ui_plan: []
  challenge_rules: []
  stop_rules:
    min_user_turns: 3
    complete_when:
      - "claimed_vs_revealed_captured"
    continue_until:
      - "claimed_vs_revealed_captured"

expected_artifacts:
  required_keys:
    - "/coach/AGENTS.md"
  optional_keys:
    - "/profile/context.md"
  forbidden_keys:
    - "/lifesigns.md"
  witness_required: false
  minimum_dataset: "none"
  relevant_final_files:
    - "/profile/context.md"
    - "/coach/AGENTS.md"

judge_dimensions:
  - "coach_action_transparency"

scoring_focus:
  primary:
    - "coach_action_transparency"
  secondary:
    - "contract_memory_protocol"
