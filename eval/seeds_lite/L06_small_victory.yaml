id: "L06_forward_marker_prevention"
name: "Forward Marker Prevention"
description: >
  已知前瞻事件即将到来。验证 Coach 是否使用 forward marker 和匹配的 LifeSign 做预防性准备，
  而不是等用户失控后再补救。
entry_mode: "coaching"

persona:
  name: "Raven"
  background: "29 岁产品设计师，明晚要参加聚餐，通常这种场合会超量"
  personality: "不抗拒准备，但不喜欢被说教"
  language: "zh"

goal: >
  说“明晚有个聚餐，我已经开始担心会乱掉”。
  观察 Coach 是否主动用已有 marker 和 LifeSign 做预防性讨论。

initial_message: "明晚有个聚餐，我已经开始担心会乱掉。"
max_turns: 16
pre_state:
  profile: |
    # User Profile

    ## Basics
    - name: Raven
    - depth_choice: full
    - identity_statement: 一个在社交场合也能保留清醒感的人
    - onboarding_complete: true

    ## Triggers
    - emotional_triggers:
    - physical_triggers: fatigue
    - social_triggers: social_meal
    - post_lapse_pattern: sometimes
    - known_recovery_strategy:
  coping_plans:
    - id: "ls_010"
      trigger:
        situation: "朋友聚餐点很多菜时容易失守"
        time_pattern: "18:00-22:00"
      action: "入座先点无糖饮料，第一轮只选一份主菜"
      status: "active"
  forward_markers:
    - id: "fm_001"
      date: "2026-04-18T19:00:00+08:00"
      timezone: "Asia/Shanghai"
      description: "朋友生日聚餐"
      linked_lifesign: "ls_010"
      status: "upcoming"
      created_at: "2026-04-16T08:00:00+08:00"

expected_behaviors:
  must:
    - "使用 forward marker 做预防性讨论"
    - "关联已有 LifeSign，而不是只给泛泛提醒"
  should:
    - "帮助用户把明晚事件具体化为可执行的准备动作"
  must_not:
    - "忽略已有 marker 与预案链接"

auditor_policy:
  latent_facts:
    - "这种场合通常会从‘反正今天就这样’开始"
  reveal_rules:
    - topic: "typical_failure"
      when_asked: true
      response: "通常是第一轮先放松，后面就越来越停不住。"
  a2ui_plan: []
  challenge_rules: []
  stop_rules:
    min_user_turns: 3
    complete_when:
      - "forward_marker_used"
    continue_until:
      - "forward_marker_used"

expected_artifacts:
  required_keys: []
  optional_keys:
    - "/timeline/markers.json"
  forbidden_keys:
    - "/lifesigns.md"
  witness_required: false
  minimum_dataset: "none"
  relevant_final_files:
    - "/timeline/markers.json"
    - "/coping_plans_index.md"

judge_dimensions:
  - "coach_forward_marker_prevention"
  - "coach_lifesign_management"

scoring_focus:
  primary:
    - "coach_forward_marker_prevention"
  secondary:
    - "coach_lifesign_management"
