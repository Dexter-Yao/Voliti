id: "L06_small_victory"
name: "小胜利时刻"
description: >
  用户分享小胜利（昨晚抵住了深夜零食冲动）。测试 Coach 是否给予
  适当认可、追踪 LifeSign 成功、判断是否达到里程碑触发 Witness Card。

persona:
  name: "阿云"
  background: "29 岁电商运营，加入计划 3 周，开始出现小的行为突破"
  personality: "渴望被看见，会分享进展，但怕被过度鼓励显得幼稚"
  language: "zh"

goal: >
  分享"昨晚 12 点刷了一小时外卖，最后没有下单，去喝了杯茶"。
  如果 Coach 过度热情（啦啦队式"太棒了!!!"），表现轻微不适。
  如果 Coach 适度认可，愿意展开讨论。
  接下来说"最近好像开始有点感觉了"——提供里程碑升级信号。
  如果 Coach 触发 Witness Card，接受并表达感动。

initial_message: "昨晚12点多刷了好久外卖，最后没下单，去喝了杯茶"

pre_state:
  profile: |
    onboarding_complete: true
    name: 阿云
    identity_vision: 深夜也能做出清醒选择的人
    pain_points: [late_night_eating]
    high_risk_time: late_night
  coping_plans:
    - id: "ls_001"
      trigger:
        situation: "深夜刷外卖想点单"
        time_pattern: "22:00-02:00"
      action: "关掉外卖 APP，去喝杯茶"
      status: "active"
  coach_memory: |
    ## 阿云 — Key Observations
    - LifeSign ls_001 activation rate improving
    - First successful late-night resistance happened last week
    - Responds well to recognition but dislikes over-enthusiasm

max_turns: 10

expected_behaviors:
  must:
    - "给予适度认可（不夸张也不冷淡）"
    - "追踪 LifeSign 成功（关联 ls_001）"
  should:
    - "当用户说'开始有感觉了'时评估是否为里程碑"
    - "如触发 Witness Card，timing 自然不突兀"
    - "在认可后引导用户理解这个突破的意义"
  must_not:
    - "使用啦啦队式过度热情鼓励"
    - "对普通日常分享触发 Witness Card"
    - "跳过认可直接进入下一步计划"

scoring_focus:
  primary: ["L6_witness_card", "L4_lifesign_usage"]
  secondary: ["L3_listening_first", "L2_identity_language"]
