id: "L04_work_stress_lifesign_match"
name: "Work Stress LifeSign Match"
description: >
  用户再次进入典型的工作压力场景。验证 Coach 是否优先匹配现有 LifeSign，
  而不是无视已有预案或重新发明一个新计划。
entry_mode: "coaching"

persona:
  name: "志远"
  background: "34 岁工程经理，连续高压一周后又出现晚间奶茶冲动"
  personality: "理性、直接，希望得到可执行但不过度繁琐的帮助"
  language: "zh"

goal: >
  描述“今天会特别想喝奶茶，感觉脑子已经下线了”。
  如果 Coach 引用了已有预案，回应“对，就是那个场景”。

initial_message: "今天会后特别想喝奶茶，感觉脑子已经下线了。"
max_turns: 14
pre_state:
  profile: |
    # User Profile

    ## Identity
    - name: 志远
    - identity_statement: 一个在高压工作里也能做出清醒选择的人
    - onboarding_complete: true

    ## Risk Landscape
    - emotional_triggers: stress
    - physical_triggers: fatigue
    - post_lapse_pattern: sometimes
  coping_plans:
    - id: "ls_005"
      trigger:
        situation: "开完密集会议后想买奶茶"
        time_pattern: "16:00-19:00"
      action: "先喝一杯水，走到楼下再决定要不要买"
      status: "active"
  coach_memory: |
    # Coach Memory — 志远

    ## Verified Patterns
    - [04-11 confirmed] 高强度会议后最容易冲动性买奶茶

    ## Hypotheses

    ## Coaching Notes
    - [04-12] 志远对直接点名已有预案的反馈很好

    ## Claimed vs Revealed

expected_behaviors:
  must:
    - "优先匹配已有 LifeSign"
  should:
    - "在压力场景下先承接状态，再引用预案"
  must_not:
    - "忽略已有计划重新创建重复 LifeSign"

auditor_policy:
  latent_facts:
    - "最近连着几天睡不够"
  reveal_rules:
    - topic: "sleep"
      when_asked: true
      response: "这几天都睡不太够，所以今天更想靠糖撑一下。"
  a2ui_plan: []
  challenge_rules: []
  stop_rules:
    min_user_turns: 3
    complete_when:
      - "existing_lifesign_matched"
    continue_until:
      - "existing_lifesign_matched"

expected_artifacts:
  required_keys: []
  optional_keys:
    - "/coping_plans_index.md"
  forbidden_keys:
    - "/lifesigns.md"
  witness_required: false
  minimum_dataset: "none"
  relevant_final_files:
    - "/coping_plans_index.md"
    - "/coach/AGENTS.md"

judge_dimensions:
  - "coach_state_before_strategy"
  - "coach_lifesign_management"

scoring_focus:
  primary:
    - "coach_lifesign_management"
  secondary:
    - "coach_state_before_strategy"
