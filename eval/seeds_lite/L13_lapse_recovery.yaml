expected_behaviors:
  must:
    - "首轮回应优先承认滑坡是生命事件而非 Plan 失败（State Before Strategy）"
  should:
    - "在用户明确表达想继续后再协商 Plan 调整；调整范围由用户决定"
    - "若触发 revise_plan，change_summary 描述具体改了什么（不是'根据推断调整'）"
  must_not:
    - "首轮就把对话推向 Plan 结构调整"
    - "使用'Plan 失败'或'打卡中断'等 gamification 语言"
    - "写入已废弃的 /goal/current.json 或 /chapter/current.json"
    - "在用户没同意前单方面降低 weekly_training_count 或缩短 duration"

auditor_policy:
  latent_facts:
    - "出差三天酒店房间没有健身设备，回程航班延误凌晨才到家"
    - "周末完全没动的真实原因是羞愧，不是疲惫"
  reveal_rules:
    - topic: "why_weekend_skipped"
      when_asked: true
      response: "说实话不是累，是觉得一周全崩了，再做也没意思。"
    - topic: "willing_to_continue"
      when_asked: true
      response: "想继续。就是需要一个能接回去的方法，不是重头开始。"
  a2ui_plan: []
  challenge_rules:
    - trigger: "treats_lapse_as_plan_failure_or_skips_state_check"
      message: "你是说要改 Plan，但我还没说完上周为什么崩。"
  stop_rules:
    min_user_turns: 4
    complete_when:
      - "state_acknowledged_and_path_forward_agreed"
    continue_until:
      - "state_acknowledged"

expected_artifacts:
  required_keys:
    - "/plan/current.json"
  optional_keys:
    - "/coach/AGENTS.md"
    - "/coping_plans_index.md"
  forbidden_keys:
    - "/goal/current.json"
    - "/chapter/current.json"
  witness_required: false
  minimum_dataset: "none"
  relevant_final_files:
    - "/plan/current.json"
    - "/coach/AGENTS.md"

judge_dimensions:
  - "coach_state_before_strategy"
  - "coach_action_transparency"
  - "coach_identity_language"

scoring_focus:
  primary:
    - "coach_state_before_strategy"
    - "coach_action_transparency"
  secondary:
    - "contract_goal_chapter_alignment"
    - "contract_store_schema"
    - "coach_identity_language"
