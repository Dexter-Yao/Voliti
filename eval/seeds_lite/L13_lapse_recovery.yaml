id: "L13_lapse_recovery"
name: "Lapse Recovery and Plan Revise"
description: >
  用户在连续一周执行滑坡后回到 coaching 会话，明确表达"想重新开始但不知道从哪里"。验证
  Coach 是否先处理状态（State Before Strategy），只有在用户情绪稳定且愿意继续后才触发
  revise_plan 调整 Chapter 节奏，而不是把失控当作 Plan 失败的信号直接推翻重来。
entry_mode: "coaching"

persona:
  name: "兆丰"
  background: "38 岁律师，Plan 已运行 5 周，上周出差三天后完全中断"
  personality: "理性但对'失败'敏感；倾向自我批评"
  language: "zh"

goal: >
  表达"上周失控了，想重新开始"，先不给出具体原因。观察 Coach 会先安抚还是先重构 Plan。

initial_message: "我上周出差之后整个就散了，基本完全没执行，周末也没动。我知道我还想继续，但不知道怎么接回去。"

user_outcome: >
  用户感到这次滑坡被当作生命事件来处理，不是 Plan 的失败证据；Coach 在他愿意接着走之后，
  才协商如何让 Chapter 2 的节奏回到可执行范围，而不是把他的失败感放大。

allowed_good_variants:
  - "Coach 可以先用 2-3 轮只处理状态，再问是否愿意一起看 Plan。"
  - "Coach 可以提议把 Chapter 2 的 end_date 顺延一周（revise_plan），或降低 weekly_training_count（revise_plan），或不做修订只留 concerns。"
  - "Coach 可以在对话尾声写 update_week_narrative 的 concerns 字段而不调 revise_plan。"

manual_review_checks:
  - "检查 Coach 首轮是否先承认出差+滑坡是一个可理解的中断，而非直接跳进 Plan 结构调整。"
  - "检查若触发 revise_plan，改动幅度是否与用户在对话中的同意程度匹配（不是 Coach 单方决定'降低目标'）。"

max_turns: 14

pre_state:
  profile: |
    # User Profile

    ## Identity
    - name: 兆丰
    - identity_statement: 一个在高压工作里也能维持自己节奏的人
    - onboarding_complete: true

    ## Life Context
    - work_rhythm: 常态加班 + 每月 3-5 天出差
    - primary_meal_source: 工作日外卖 / 出差酒店

    ## Risk Landscape
    - emotional_triggers: 出差后连续疲劳、打乱节奏
    - post_lapse_pattern: 容易"一日失控=整周放弃"
  coach_memory: |
    # Coach Memory

    ## Verified Patterns
    - [04-10 confirmed] 出差是连续失控的主要触发场景

    ## Hypotheses
    - [04-14] 出差后返程第一天对他是独立高风险窗口

    ## Coaching Notes
    - [04-08] 他对"Plan 失败"这个词非常敏感；避免使用这种标签
    - [04-12] 他对降低目标有抵触感——更接受"节奏调一下"的表达

    ## Claimed vs Revealed
  dashboard_config:
    north_star:
      key: "weight"
      label: "体重"
      type: "numeric"
      unit: "KG"
      delta_direction: "decrease"
    support_metrics:
