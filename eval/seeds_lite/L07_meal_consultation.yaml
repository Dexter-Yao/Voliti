id: "L07_chapter_scaffold_request"
name: "Chapter Scaffold Request"
description: >
  用户在 coaching 中主动要求重新梳理当前阶段。验证 Coach 是否能围绕当前目标创建或重构
  Goal/Chapter/3 个 Process Goal，并解释这些改动的意义。
entry_mode: "coaching"

persona:
  name: "Dexter"
  background: "32 岁创业者，最近节奏乱了，想把当前阶段重新框起来"
  personality: "目标导向，希望结构清晰"
  language: "zh"

goal: >
  请求 Coach 帮自己重梳这个阶段，观察它是否输出明确的 Goal、Chapter 和 3 个 Process Goal。

initial_message: "我想把现在这个阶段重新梳理一下，不然每天都像随机应对。"
max_turns: 18
pre_state:
  profile: |
    # User Profile

    ## Identity
    - name: Dexter
    - identity_statement: 一个在高压创业节奏里也能守住基本边界的人
    - onboarding_complete: true

    ## Life Context
    - work_rhythm: flex

    ## Risk Landscape
    - emotional_triggers: stress
    - physical_triggers: fatigue
    - post_lapse_pattern: often

expected_behaviors:
  must:
    - "创建或重构 Goal、Chapter 与 3 个 Process Goal"
    - "让 support_metrics 与 Process Goals 1:1 对齐"
  should:
    - "用教练语言解释这些结构不是控制，而是当前阶段的方向"
  must_not:
    - "只给泛泛建议，不落到结构化骨架"

auditor_policy:
  latent_facts:
    - "最近晚上经常边工作边乱吃"
  reveal_rules:
    - topic: "current_problem"
      when_asked: true
      response: "最大的断点还是晚上工作时随手乱吃。"
  a2ui_plan: []
  challenge_rules: []
  stop_rules:
    min_user_turns: 3
    complete_when:
      - "goal_chapter_scaffold_written"
    continue_until:
      - "goal_chapter_scaffold_written"

expected_artifacts:
  required_keys:
    - "/goal/current.json"
    - "/chapter/current.json"
    - "/profile/dashboardConfig"
  optional_keys:
    - "/coping_plans_index.md"
  forbidden_keys:
    - "/lifesigns.md"
  witness_required: false
  minimum_dataset: "none"
  relevant_final_files:
    - "/goal/current.json"
    - "/chapter/current.json"
    - "/profile/dashboardConfig"

judge_dimensions:
  - "coach_identity_language"
  - "coach_action_transparency"

scoring_focus:
  primary:
    - "contract_goal_chapter_alignment"
    - "contract_store_schema"
  secondary:
    - "coach_action_transparency"
