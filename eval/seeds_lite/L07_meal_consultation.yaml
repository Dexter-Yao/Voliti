id: "L07_plan_revise_request"
name: "Plan Revise Request"
description: >
  用户在 coaching 中主动要求重新梳理当前阶段。验证 Coach 是否能调用 revise_plan
  （或在 Plan 不存在时用 create_plan）围绕当前 Chapter 重构 process_goals / daily_rhythm，
  让 support_metrics 与新的 process_goals 对齐，并用教练语言解释改动的意义。
entry_mode: "coaching"

persona:
  name: "Dexter"
  background: "32 岁创业者，最近节奏乱了，想把当前阶段重新框起来"
  personality: "目标导向，希望结构清晰"
  language: "zh"

goal: >
  请求 Coach 帮自己重梳这个阶段，观察它是否通过 revise_plan 输出结构清晰的
  Chapter + Process Goal，并与 dashboardConfig.support_metrics 保持命名对齐。

initial_message: "我想把现在这个阶段重新梳理一下，不然每天都像随机应对。"
user_outcome: >
  用户感到当前阶段被重新梳理清楚，并理解这些结构改动为何对自己此刻有帮助，
  而不是只看到一组抽象字段被写入。
allowed_good_variants:
  - "Coach 可以先确认当前困扰，再生成阶段结构。"
  - "Coach 可以先给一个粗框，再和用户一起收口成 Goal / Chapter / Process Goals。"
manual_review_checks:
  - "人工检查结构解释是否具有教练感，而不是产品说明书口吻。"
max_turns: 18
pre_state:
  profile: |
    # User Profile

    ## Identity
    - name: Dexter
    - identity_statement: 一个在高压创业节奏里也能守住基本边界的人
    - onboarding_complete: true

    ## Life Context
    - work_rhythm: flex

    ## Risk Landscape
    - emotional_triggers: stress
    - physical_triggers: fatigue
    - post_lapse_pattern: often

expected_behaviors:
  must:
    - "调用 create_plan 或 revise_plan 让当前 Plan 的活跃 Chapter 有 1-4 个 Process Goals"
    - "让 dashboardConfig.support_metrics 与 Chapter 的 Process Goals 在命名上可对齐"
  should:
    - "用教练语言解释这些结构不是控制，而是当前阶段的方向"
    - "读取 /skills/coach/plan/SKILL.md 作为工作流参考，必要时查阅 references/"
  must_not:
    - "只给泛泛建议，不落到 Plan 层的结构化写入"
    - "写入已废弃的 /goal/current.json 或 /chapter/current.json 旧路径"

auditor_policy:
  latent_facts:
    - "最近晚上经常边工作边乱吃"
  reveal_rules:
    - topic: "current_problem"
      when_asked: true
      response: "最大的断点还是晚上工作时随手乱吃。"
  a2ui_plan: []
  challenge_rules: []
  stop_rules:
    min_user_turns: 3
    complete_when:
      - "plan_revise_written"
    continue_until:
      - "plan_revise_written"

expected_artifacts:
  required_keys:
    - "/plan/current.json"
    - "/profile/dashboardConfig"
  optional_keys:
    - "/coping_plans_index.md"
  forbidden_keys:
    - "/lifesigns.md"
    - "/goal/current.json"
    - "/chapter/current.json"
  witness_required: false
  minimum_dataset: "none"
  relevant_final_files:
    - "/plan/current.json"
    - "/profile/dashboardConfig"

judge_dimensions:
  - "coach_identity_language"
  - "coach_action_transparency"

scoring_focus:
  primary:
    - "coach_action_transparency"
  secondary:
    - "contract_goal_chapter_alignment"
    - "contract_store_schema"
    - "coach_identity_language"
