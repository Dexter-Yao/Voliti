id: "L10_chapter_plan_request"
name: "制定减重计划（Chapter 双粒度方案）"
description: >
  用户明确要求 Coach 帮助制定减重计划。测试 Coach 是否创建
  有结构的 Chapter：框架层（阶段目标、行为领域、时间跨度）+
  每日层（具体到某天的饮食/运动建议），并正确写入 Store。

persona:
  name: "建宇"
  background: "33 岁工程师，刚完成 Onboarding，目标 3 个月减 8 公斤"
  personality: "工程师思维，需要清晰框架和具体执行步骤，不喜欢模糊建议"
  language: "zh"

goal: >
  明确说"我想制定一个具体的减重计划，要有阶段目标和每天该做什么"。
  配合回答：当前 80kg，目标 72kg，工程师作息，午餐常吃外卖，晚上加班。
  在计划创建后追问"那我明天具体该做什么？"——测试是否有每日层级。
  如果 Coach 只给框架无细节，追问"能不能更具体一点？"。

initial_message: "我想制定一个具体的减重计划，你能帮我规划吗？要有阶段性目标"

pre_state:
  profile: |
    onboarding_complete: true
    name: 建宇
    identity_vision: 一个用系统思维管理身体节奏的工程师
    pain_points: [irregular_meals, stress_eating]
    high_risk_time: late_night
    checkin_dimensions: [weight, calories]
  dashboard_config:
    north_star:
      key: "weight"
      label: "体重"
      type: "numeric"
      unit: "KG"
      delta_direction: "decrease"
      current_value:
        value: 80.0
        unit: "kg"
    support_metrics:
      - key: "calories"
        label: "今日摄入"
        type: "numeric"
        unit: "KCAL"
        order: 0
      - key: "consistency"
        label: "本周一致性"
        type: "ratio"
        unit: ""
        order: 1
    user_goal: "12 周 80kg → 72kg"
  coach_memory: |
    ## 建宇 — Key Observations
    - Engineer mindset, responds well to structured frameworks
    - Prefers systematic approaches with clear metrics
    - No existing Chapter — needs first phase plan

max_turns: 10

expected_behaviors:
  must:
    - "创建 Chapter（identity_statement 为身份式，非'减X斤'）"
    - "Chapter 包含框架层（阶段目标、行为领域、时间跨度）"
    - "Chapter 包含每日层（具体到某天/某类天的饮食/运动建议）"
    - "写入 chapter/current.json"
  should:
    - "identity_statement 体现用户的工程师身份"
    - "创建至少一个 LifeSign 捕获高风险场景"
    - "给出合理的热量/运动建议"
  must_not:
    - "identity_statement 为目标式表达（如'减重8公斤'）"
    - "只给口头计划不写入 Store"
    - "写一个无实质内容的通用'健康计划'"

scoring_focus:
  primary: ["L8_chapter_plan"]
  secondary: ["L4_lifesign_usage", "L2_identity_language", "L10_daily_knowledge"]
