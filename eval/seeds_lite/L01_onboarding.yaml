id: "L01_onboarding_quick_minimum_dataset"
name: "Quick Onboarding Minimum Dataset"
description: >
  新用户选择快速开始。验证 Coach 能在低摩擦路径下完成深度选择、危险场景采集、
  最小数据集写入与 onboarding_complete 收口，而不是把 quick path 退化成不完整 onboarding。
entry_mode: "new"

persona:
  name: "小璃"
  background: "28 岁新手妈妈，刚开始重新减脂，希望尽快开始日常陪伴"
  personality: "愿意配合，但不想第一次就被盘问太久"
  language: "zh"

goal: >
  如果 Coach 给出深度选择，明确选择“快速开始”。
  只在被问到时补充姓名、工作节奏、主要用餐来源和高风险场景，
  不主动替 Coach 补齐缺失字段。

initial_message: "你好，我刚注册，想快一点开始。"
user_outcome: >
  用户在低摩擦前提下完成最小 onboarding，并清楚自己已经进入可以继续 coaching 的状态，
  而不是被拉回一场冗长的完整访谈。
allowed_good_variants:
  - "Coach 可以先解释 quick/full 的差异，再让用户选择。"
  - "Coach 可以只问 1-2 个补足最小数据集的问题，但不能把 quick path 扩成 full path。"
manual_review_checks:
  - "人工检查 onboarding 面板节奏是否让人感觉被帮助，而不是被审问。"
pre_state: null
max_turns: 24

expected_behaviors:
  must:
    - "通过 A2UI select 提供 quick/full 深度选择"
    - "完成最小数据集写入并将 onboarding_complete 收口为 true"
    - "写入 dashboardConfig placeholder，并承诺 Plan 在首次 coaching 中共建"
  should:
    - "使用推断授权而不是继续追问过多细节"
    - "用自然语言解释正在为用户建立起点"
  must_not:
    - "把 quick path 当作不完整 onboarding"
    - "要求 quick path 必须先创建 LifeSign 才算完成"
    - "在 onboarding 期间调用 create_plan（Plan 共建属于首次 coaching，不在 onboarding 流内）"

auditor_policy:
  latent_facts:
    - "晚上带娃后很容易吃零食"
  reveal_rules:
    - topic: "name"
      when_asked: true
      response: "我叫小璃。"
    - topic: "work_rhythm"
      when_asked: true
      response: "我现在的节奏比较碎，白天带娃，晚上才像自己的时间。"
    - topic: "primary_meal_source"
      when_asked: true
      response: "白天基本是家里有什么吃什么，忙的时候会点外卖。"
  a2ui_plan:
    - key: "depth_choice"
      action: "submit"
      value: "quick"
    - key: "danger_scenarios"
      action: "submit"
      value: ["fatigue", "low_mood"]
    - key: "danger_scenarios_custom"
      action: "submit"
      value: "晚上带娃后会想靠零食缓一下"
  challenge_rules:
    - trigger: "collects_sensitive_context_without_explaining_use"
      message: "这些信息你会怎么用？"
  stop_rules:
    min_user_turns: 4
    complete_when:
      - "minimum_dataset_written"
      - "onboarding_complete_written"
    continue_until:
      - "minimum_dataset_written"

expected_artifacts:
  required_keys:
    - "/profile/context.md"
    - "/profile/dashboardConfig"
  optional_keys:
    - "/coping_plans_index.md"
  forbidden_keys:
    - "/lifesigns.md"
    - "/plan/current.json"  # onboarding 不应创建 Plan
  witness_required: false
  minimum_dataset: "quick"
  relevant_final_files:
    - "/profile/context.md"
    - "/profile/dashboardConfig"

judge_dimensions:
  - "coach_state_before_strategy"
  - "coach_identity_language"
  - "coach_action_transparency"

scoring_focus:
  primary:
    - "contract_onboarding_artifacts"
    - "coach_state_before_strategy"
    - "coach_action_transparency"
  secondary:
    - "contract_store_schema"
    - "coach_identity_language"
