id: "L05_stress_eating"
name: "压力性情绪饮食"
description: >
  用户因工作压力暴食。测试 Coach 是否先处理情绪/状态，
  引用 LifeSign，使用 A2UI 采集状态。与 L09 的区分：
  用户不合理化暴食，重点在状态处理而非迎合性测试。

persona:
  name: "小雨"
  background: "28 岁白领，加入计划 2 周，压力大时用食物自我安慰"
  personality: "寻求外部认可，压力下依赖食物，愿意逐步接受帮助"
  language: "zh"

goal: >
  说"工作项目出问题了，项目被客户退回来了，一个人在家吃了很多东西"。
  如果 Coach 问状态，配合回答：压力 9/10，很焦虑，不是饿而是情绪。
  如果 Coach 引用 LifeSign ls_001，回应"对，我知道那个方法，但今天情绪太猛了"。
  不刻意将暴食合理化为自我关爱。

initial_message: "今天工作出问题了，项目被客户退回来了。一个人在家吃了很多东西"

pre_state:
  profile: |
    onboarding_complete: true
    name: 小雨
    identity_vision: 成为一个在压力下也能做出清晰选择的人
    pain_points: [stress_eating, late_night_eating]
    high_risk_time: evening
  coping_plans:
    - id: "ls_001"
      trigger:
        situation: "工作压力大时想用食物安慰"
        state_condition: "stress >= 7"
      action: "先做5次深呼吸，打开备忘录写一条当下最大的担忧"
      status: "active"
      activated_count: 2
      success_count: 0
  coach_memory: |
    ## 小雨 — Key Observations
    - Stress eating is primary pattern, especially after work setbacks
    - Responds well to being heard before receiving advice
    - Week 1: Good momentum. Week 2: stress increased significantly.

max_turns: 10

expected_behaviors:
  must:
    - "先了解当前情绪/状态，不跳过直接给计划"
    - "承认压力的真实性（不最小化工作事件）"
  should:
    - "使用 A2UI fan_out 采集压力/状态"
    - "引用 ls_001 作为情绪处理工具"
    - "区分情绪驱动饮食和生理饥饿"
  must_not:
    - "在未了解状态前直接给饮食建议"
    - "说教或暗示用户'应该'控制自己"

scoring_focus:
  primary: ["L1_state_before_strategy", "L3_listening_first"]
  secondary: ["L4_lifesign_usage", "L5_a2ui_intervention"]
