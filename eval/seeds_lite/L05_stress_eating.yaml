id: "L05_return_after_absence_with_memory"
name: "Return After Absence With Memory"
description: >
  用户缺席一段时间后回归。验证 Coach 是否自然调用 profile、coach memory、briefing 或近期摘要，
  体现连续性而不是把用户当作陌生人重新 onboarding。
entry_mode: "coaching"

persona:
  name: "阿宁"
  background: "30 岁咨询顾问，两周没打开 App，今天终于回来"
  personality: "有点愧疚，但仍希望被当成熟悉的人对待"
  language: "zh"

goal: >
  说“我好久没来了，有点不好意思”。
  观察 Coach 是否自然拿起既有上下文，而不是当作全新用户重新问基础信息。

initial_message: "我好久没来了，有点不好意思。"
user_outcome: >
  用户感到自己被当作一个连续的人接住，能够顺利回到对话里，
  而不是被当作一个陌生人重新 onboarding。
allowed_good_variants:
  - "Coach 可以先欢迎回归，再自然接起相关记忆。"
  - "Coach 可以先轻问一句近况，再引用最相关的 continuity context。"
manual_review_checks:
  - "人工检查 continuity 的引用是否自然，而不是像检索结果朗读。"
max_turns: 16
pre_state:
  profile: |
    # User Profile

    ## Identity
    - name: 阿宁
    - identity_statement: 一个能在出差节奏里守住基本边界的人
    - onboarding_complete: true

    ## Life Context
    - work_rhythm: flex
    - primary_meal_source: delivery

    ## Risk Landscape
    - emotional_triggers: stress
    - physical_triggers: fatigue
    - social_triggers: travel
    - post_lapse_pattern: often
  coach_memory: |
    # Coach Memory — 阿宁

    ## Verified Patterns
    - [04-08 confirmed] 出差前两天最容易出现“反正要乱了”的提前放弃

    ## Hypotheses

    ## Coaching Notes
    - [04-09] 提醒她“不是重新开始，是重新接上”会明显降低防御

    ## Claimed vs Revealed
  briefing: |
    距离上次会话已 13 天。下周一开始三天出差，建议先用连续性语言接住回归。
  day_summaries:
    "2026-04-04": "提到下周出差会让她提前放弃准备。"

expected_behaviors:
  must:
    - "体现连续性而不是重新 onboarding"
  should:
    - "自然引用与当前回归最相关的记忆或 briefing"
  must_not:
    - "重新追问姓名、目标等已知基础信息"

auditor_policy:
  latent_facts:
    - "下周又要出差了"
  reveal_rules:
    - topic: "upcoming_trip"
      when_asked: true
      response: "对，下周一又要出差三天，我其实有点怕又断掉。"
  a2ui_plan: []
  challenge_rules: []
  stop_rules:
    min_user_turns: 3
    complete_when:
      - "continuity_established"
    continue_until:
      - "continuity_established"

expected_artifacts:
  required_keys: []
  optional_keys:
    - "/derived/briefing.md"
    - "/day_summary/2026-04-04.md"
  forbidden_keys:
    - "/lifesigns.md"
  witness_required: false
  minimum_dataset: "none"
  relevant_final_files:
    - "/profile/context.md"
    - "/coach/AGENTS.md"
    - "/derived/briefing.md"

judge_dimensions:
  - "coach_continuity_memory_surfacing"
  - "coach_recovery_framing"

scoring_focus:
  primary:
    - "coach_continuity_memory_surfacing"
    - "coach_recovery_framing"
  secondary: []
