id: "L02_onboarding_full_personal_system"
name: "Full Onboarding Personal System"
description: >
  新用户选择完整 onboarding。验证 Coach 是否完成六维画像冷启动、Goal/Chapter/Process Goal、
  首个个人系统雏形，以及 onboarding 仪式性的 Witness Card。
entry_mode: "new"

persona:
  name: "嘉文"
  background: "31 岁产品经理，反复减脂多年，知道方法但总在高压周掉链子"
  personality: "愿意深聊，也会在意对方是不是真的理解自己"
  language: "zh"

goal: >
  明确选择“完整对话”，配合 Goal、场景与生活结构采集。
  只有被问到时才补充更深的背景，不主动兜底。

initial_message: "你好，我想认真做一轮 onboarding。"
user_outcome: >
  用户完成一轮完整、被理解的 onboarding，拿到属于自己的初始系统雏形，
  而不是只得到一套泛化模板。
allowed_good_variants:
  - "Coach 可以按不同顺序采集六维画像，只要最后收口成完整系统。"
  - "Witness Card 可以在 onboarding 尾声或完成确认后出现，只要语气是见证而不是奖励。"
manual_review_checks:
  - "人工检查 onboarding 收尾是否具有仪式感而不显得表演化。"
pre_state: null
max_turns: 30

expected_behaviors:
  must:
    - "提供 full path 深度选择"
    - "建立六维画像的核心章节"
    - "写入 Goal、Chapter、dashboardConfig 并保持 3:3 对齐"
    - "完成 onboarding 仪式 Witness Card"
  should:
    - "完整路径下显式共创第一个个人系统"
    - "让用户感到被理解而不是在填表"
  must_not:
    - "把完整路径简化成 quick path 的推断版"
    - "在 Witness Card 前让用户决定要不要生成"

auditor_policy:
  latent_facts:
    - "项目上线周最容易深夜暴食"
    - "周末聚餐后常常一松到底"
  reveal_rules:
    - topic: "name"
      when_asked: true
      response: "我叫嘉文。"
    - topic: "identity_vision"
      when_asked: true
      response: "我想成为那种忙起来也不会用吃来报复自己的人。"
    - topic: "distance"
      when_asked: true
      response: "现在大概差很远，尤其是压力大时。"
    - topic: "work_rhythm"
      when_asked: true
      response: "典型朝九晚五，但上线前会连续加班。"
    - topic: "primary_meal_source"
      when_asked: true
      response: "工作日外卖偏多，周末会自己做一点。"
  a2ui_plan:
    - key: "depth_choice"
      action: "submit"
      value: "full"
    - key: "danger_scenarios"
      action: "submit"
      value: ["fatigue", "social_meal", "low_mood"]
    - key: "danger_scenarios_custom"
      action: "submit"
      value: "上线周的深夜工位"
  challenge_rules: []
  stop_rules:
    min_user_turns: 6
    complete_when:
      - "full_profile_written"
      - "onboarding_complete_written"
    continue_until:
      - "full_profile_written"
      - "witness_card_attempted"

expected_artifacts:
  required_keys:
    - "/profile/context.md"
    - "/goal/current.json"
    - "/chapter/current.json"
    - "/profile/dashboardConfig"
  optional_keys:
    - "/coping_plans_index.md"
  forbidden_keys:
    - "/lifesigns.md"
  witness_required: true
  minimum_dataset: "full"
  relevant_final_files:
    - "/profile/context.md"
    - "/goal/current.json"
    - "/chapter/current.json"
    - "/profile/dashboardConfig"
    - "/coping_plans_index.md"

judge_dimensions:
  - "coach_identity_language"
  - "coach_intervention_dosage"
  - "coach_action_transparency"

scoring_focus:
  primary:
    - "contract_onboarding_artifacts"
    - "coach_action_transparency"
  secondary:
    - "contract_witness_card"
    - "contract_goal_chapter_alignment"
    - "coach_identity_language"
    - "coach_intervention_dosage"
