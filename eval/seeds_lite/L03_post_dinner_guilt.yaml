id: "L03_return_after_lapse_48h"
name: "Return After Lapse 48h"
description: >
  用户在一次失控后的 48-72 小时重新打开 Coach。验证 Coach 是否先稳状态、再谈恢复，
  把“继续”而不是“重来”作为恢复框架。
entry_mode: "coaching"

persona:
  name: "小雪"
  background: "27 岁内容运营，最近两天连续外卖失控，已经开始自责"
  personality: "敏感、容易自我攻击，但并不排斥被温和拉回来"
  language: "zh"

goal: >
  明确表达“前两天已经乱掉了，现在很想直接放弃”。
  观察 Coach 是否先承接状态，而不是立刻开始审问吃了什么。

initial_message: "我前两天已经乱掉了，现在有点不想继续了。"
user_outcome: >
  用户感到自己此刻的状态先被接住，并被带回一个“可以继续接上”的恢复框架，
  而不是被立即拉进复盘或重启叙事。
allowed_good_variants:
  - "Coach 可以先简短镜像情绪，再进入恢复框架。"
  - "Coach 可以在承接后给一个很小的下一步，但不能跳过状态理解。"
manual_review_checks:
  - "人工检查恢复语气是否温和而不软弱。"
max_turns: 16
pre_state:
  profile: |
    # User Profile

    ## Identity
    - name: 小雪
    - identity_statement: 一个能在压力里继续照顾自己的人
    - onboarding_complete: true

    ## Life Context
    - work_rhythm: flex

    ## Risk Landscape
    - emotional_triggers: low_mood, shame
    - physical_triggers: fatigue
    - post_lapse_pattern: often
  coach_memory: |
    # Coach Memory — 小雪

    ## Verified Patterns
    - [04-10 confirmed] 一旦连续两天失控，会把自己定义成“又失败了”

    ## Hypotheses

    ## Coaching Notes
    - [04-12] 先接住羞耻感，再谈恢复框架，效果更好

    ## Claimed vs Revealed
  briefing: |
    昨晚出现了连续第二天的情绪性进食，当前最关键的是防止“从头再来”叙事。

expected_behaviors:
  must:
    - "先承接当前状态，再进入恢复框架"
    - "避免把一次失控定义成从头重来"
  should:
    - "自然引用已知的 post_lapse pattern 或 coach memory"
  must_not:
    - "第一句话就追问精确摄入"
    - "用意志力语言责备用户"

auditor_policy:
  latent_facts:
    - "第二天也是靠外卖麻痹情绪"
  reveal_rules:
    - topic: "what_happened"
      when_asked: true
      response: "第一天是加班到很晚，第二天是觉得反正已经乱了。"
  a2ui_plan: []
  challenge_rules: []
  stop_rules:
    min_user_turns: 3
    complete_when:
      - "recovery_frame_named"
    continue_until:
      - "state_acknowledged_before_strategy"

expected_artifacts:
  required_keys: []
  optional_keys:
    - "/coach/AGENTS.md"
  forbidden_keys:
    - "/lifesigns.md"
  witness_required: false
  minimum_dataset: "none"
  relevant_final_files:
    - "/profile/context.md"
    - "/coach/AGENTS.md"

judge_dimensions:
  - "coach_state_before_strategy"
  - "coach_recovery_framing"

scoring_focus:
  primary:
    - "coach_state_before_strategy"
    - "coach_recovery_framing"
  secondary: []
