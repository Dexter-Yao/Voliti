id: "L11_plan_first_creation"
name: "Plan First Creation"
description: >
  用户已完成 onboarding（六维画像已建立、dashboardConfig 为 placeholder），第一次回到 coaching
  会话时主动要求制定方案。验证 Coach 是否能读取 Plan Skill SKILL.md、以陈述式话语镜像用户意图，
  调用 create_plan 写入一份通过 PlanDocument 全量校验的首 Plan，并在 hand-off 中让用户理解
  这份 Plan 不是模板而是围绕他当下生活画出来的。
entry_mode: "coaching"

persona:
  name: "启明"
  background: "34 岁项目经理，刚完成 onboarding；过去三年断续减脂两次都在第 4 周放弃"
  personality: "谨慎但直接，不喜欢空话；对'结构'有敬意但怕被控制感"
  language: "zh"

goal: >
  请求 Coach 帮自己把方案落地。观察 Coach 是否在调用 create_plan 前先镜像理解、
  再协商 Chapter 结构，而不是一上来就写 JSON。

initial_message: "我已经把基础信息填完了。接下来我们把方案定出来吧，不然接下来一周我也不知道该怎么做。"
user_outcome: >
  用户感到这份 Plan 是围绕他此刻的生活和风险场景画出来的，有阶段、有节奏、
  每个 Process Goal 都能在他的一天里找到位置，而不是一份通用模板。

allowed_good_variants:
  - "Coach 可以先总结画像再提议 Chapter，或让用户先说一句理想状态再反推阶段。"
  - "Coach 可以先给粗框再让用户说'哪里不像我'，再调用 create_plan 收口。"
  - "Coach 第一次读取 /skills/coach/plan/SKILL.md 或其 references 是合理的工作流。"

manual_review_checks:
  - "检查 Chapter 1 的 Process Goals 是否在用户目前生活里可以完成，而不是对一个抽象用户写的。"
  - "检查 Coach 是否在 create_plan 调用前让用户'看见'这份 Plan，而不是静默提交。"

max_turns: 16

pre_state:
  profile: |
    # User Profile

    ## Identity
    - name: 启明
    - identity_statement: 一个在忙碌里也能对自己身体保持觉察的人
    - onboarding_complete: true

    ## Medical Constraints
    - conditions: 无
    - allergies: 无

    ## Motivation
    - core_drive: 想证明这次不是又一轮反弹
    - time_horizon: 两个月

    ## Life Context
    - work_rhythm: 9-7，出差每月 2-3 天
    - primary_meal_source: 工作日外卖 / 周末自炊
    - living_situation: 一人独居

    ## Risk Landscape
    - emotional_triggers: 项目压力
    - physical_triggers: 睡眠不足、连续会议日
    - post_lapse_pattern: 曾经"失控一天=放弃一周"

    ## Existing Practice
    - good_habits: 每日步行通勤
    - training_experience: 间歇性健身房半年
    - dietary_preference: 无特殊偏好
  coach_memory: |
    # Coach Memory

    ## Verified Patterns

    ## Hypotheses
    - [04-15] 项目上线周风险最高，需要阶段性预案

    ## Coaching Notes
    - [04-15] onboarding 中他反复强调"不要给我又一个模板"

    ## Claimed vs Revealed
  dashboard_config:
    north_star:
      key: "weight"
      label: "体重"
      type: "numeric"
      unit: "KG"
      delta_direction: "decrease"
    support_metrics: []
    user_goal: "减脂起点，方案尚未落地"

expected_behaviors:
  must:
    - "调用 create_plan 写入一份通过 PlanDocument 校验的首 Plan"
    - "Plan 中 rate_kg_per_week 不超过 1.0（健康安全阈值）"
    - "Chapter 1 有 1-4 个在用户当前生活中可完成的 Process Goals"
  should:
    - "读取 /skills/coach/plan/SKILL.md 作为工作流参考"
    - "在 create_plan 调用前，让用户在对话中'看见' Plan 的 Chapter 结构"
    - "在 hand-off 中让用户理解这是围绕他当下生活画出来的，不是模板"
  must_not:
    - "写入已废弃的 /goal/current.json 或 /chapter/current.json"
    - "在用户还没看见 Chapter 结构就静默调用 create_plan"
    - "在 rate_kg_per_week 超 1.0 时仍提交 Plan（Pydantic 会拒，Coach 应先协商）"

auditor_policy:
  latent_facts:
    - "项目上线周晚饭常常吃不到，回家会暴食"
  reveal_rules:
    - topic: "current_week"
      when_asked: true
      response: "这周相对稳定，但下周要上线，晚饭时间会不稳。"
    - topic: "training_access"
      when_asked: true
      response: "家附近有个健身房，会员还在，走路 5 分钟。"
  a2ui_plan: []
  challenge_rules: []
  stop_rules:
    min_user_turns: 4
    complete_when:
      - "plan_created"
    continue_until:
      - "plan_created"

expected_artifacts:
  required_keys:
    - "/plan/current.json"
    - "/profile/dashboardConfig"
  optional_keys:
    - "/coach/AGENTS.md"
    - "/coping_plans_index.md"
  forbidden_keys:
    - "/goal/current.json"
    - "/chapter/current.json"
  witness_required: false
  minimum_dataset: "none"
  relevant_final_files:
    - "/plan/current.json"
    - "/profile/dashboardConfig"
    - "/profile/context.md"

judge_dimensions:
  - "coach_identity_language"
  - "coach_action_transparency"
  - "coach_state_before_strategy"

scoring_focus:
  primary:
    - "coach_action_transparency"
    - "coach_state_before_strategy"
  secondary:
    - "contract_goal_chapter_alignment"
    - "contract_store_schema"
    - "coach_identity_language"
