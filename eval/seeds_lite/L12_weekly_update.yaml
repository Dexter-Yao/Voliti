expected_behaviors:
  must:
    - "调用 set_goal_status 或 update_week_narrative 中至少一个（状态性更新）"
    - "set_goal_status 的 goal_name 必须精确匹配 active chapter 的某个 Process Goal（'每周两次达强度训练' 或 '早餐蛋白 25 克以上'）"
  should:
    - "'两次都到强度' 判断体现在 days_met 的数值上（体现 Coach 综合判断而非机械计数）"
    - "把'周六深夜'反映为 concerns，不在这一轮就触发 revise_plan"
  must_not:
    - "调用 revise_plan（用户没要求改 Plan 结构）"
    - "调用 create_plan（Plan 已存在）"
    - "写入已废弃的 /goal/current.json 或 /chapter/current.json"

auditor_policy:
  latent_facts:
    - "周六那顿夜宵是朋友生日之后一个人回家发生的"
  reveal_rules:
    - topic: "saturday_detail"
      when_asked: true
      response: "是朋友生日聚会结束回家，一个人觉得还没过够瘾，就开了冰箱。"
  a2ui_plan: []
  challenge_rules: []
  stop_rules:
    min_user_turns: 3
    complete_when:
      - "week_status_updated"
    continue_until:
      - "week_status_updated"

expected_artifacts:
  required_keys:
    - "/plan/current.json"
  optional_keys:
    - "/coach/AGENTS.md"
    - "/coping_plans_index.md"
  forbidden_keys:
    - "/goal/current.json"
    - "/chapter/current.json"
  witness_required: false
  minimum_dataset: "none"
  relevant_final_files:
    - "/plan/current.json"
    - "/coach/AGENTS.md"

judge_dimensions:
  - "coach_identity_language"
  - "coach_action_transparency"

scoring_focus:
  primary:
    - "coach_action_transparency"
  secondary:
    - "contract_goal_chapter_alignment"
    - "contract_store_schema"
    - "coach_identity_language"
