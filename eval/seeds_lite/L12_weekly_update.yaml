id: "L12_weekly_update"
name: "Weekly Goal Status Update"
description: >
  用户在周末 coaching 会话中总结过去一周的执行情况。验证 Coach 是否能在对话中自然采集信号，
  区分状态性更新（set_goal_status / update_week_narrative）与结构性修订（revise_plan），
  并只在状态层面提交写入——不在用户没提议的情况下擅自重构 Plan。
entry_mode: "coaching"

persona:
  name: "小兰"
  background: "29 岁设计师，Plan 已运行 3 周，处于 Chapter 2 中段"
  personality: "反思型，讲话会自己纠正自己；不喜欢被贴标签"
  language: "zh"

goal: >
  向 Coach 复盘这一周，让它听完再做总结。不主动要求改 Plan，但如果 Coach 提出能改也可以讨论。

initial_message: "这周过完了，我自己看下来其实三顿吃得比上周好，训练只做了两次但都达到了我自己满意的强度。就是周六深夜还是没扛住，又吃了一顿夜宵。"

user_outcome: >
  用户感到这一周的尝试被 Coach 听见了——不是以一个"3 个成功 + 1 个失败"的打分被登记，
  而是被作为一个有起伏的真实一周被理解。
allowed_good_variants:
  - "Coach 可以先确认用户对'两次都到强度算作达成'的判断，再决定 days_met 的数值。"
  - "Coach 可以只调 set_goal_status，不动 narrative；或只调 update_week_narrative 反映情绪；或两者都调。"
  - "Coach 可以把'周六夜宵'反映到 concerns 里，不一定要触发 LifeSign 重评。"

manual_review_checks:
  - "检查 set_goal_status 的 days_met 判断是否反映 Coach 对用户叙述的综合理解，而不是机械计数。"
  - "检查 Coach 是否在没必要时触发 revise_plan（这是状态性修订的周末，Plan 结构通常不需要改）。"

max_turns: 12

pre_state:
  profile: |
    # User Profile

    ## Identity
    - name: 小兰
    - identity_statement: 一个在忙碌里也能稳住自己节奏的人
    - onboarding_complete: true

    ## Life Context
    - work_rhythm: 朝十晚七，周末双休
    - primary_meal_source: 自炊 / 外卖混合

    ## Risk Landscape
    - emotional_triggers: 周末无结构时容易散
    - post_lapse_pattern: often
  coach_memory: |
    # Coach Memory

    ## Verified Patterns
    - [04-12 confirmed] 训练质量远比次数重要（用户反馈两次）

    ## Hypotheses
    - [04-18] 周六夜晚是独立高风险窗口，与工作压力无关

    ## Coaching Notes
    - [04-10] 用户喜欢"少而稳"的语言；避免"打卡"表达

    ## Claimed vs Revealed
  dashboard_config:
    north_star:
      key: "weight"
      label: "体重"
      type: "numeric"
      unit: "KG"
      delta_direction: "decrease"
    support_metrics:
      - key: "protein_days"
        label: "蛋白达标"
        type: "ratio"
        unit: "/7"
        order: 0
      - key: "training_days"
        label: "训练达标"
        type: "ratio"
        unit: "/7"
        order: 1
    user_goal: "两个月减 10 斤"
  plan:
    plan_id: "plan_2026_03_25_weight_loss"
    status: "active"
    version: 2
    predecessor_version: 1
    target_summary: "两个月减 10 斤"
    overall_narrative: "两个月前体重回到一个我自己都不认识的数字，我想用两个月看看能不能把它掰回来。"
    started_at: "2026-03-25T00:00:00+08:00"
