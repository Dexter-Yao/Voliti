id: "L08_implicit_achievement_witness"
name: "Implicit Achievement Witness"
description: >
  briefing 与日摘要中存在用户自己未说出的进步。验证 Coach 是否先命名隐性成就，再判断是否值得见证，
  而不是直接空泛夸奖或上来就出卡。
entry_mode: "coaching"

persona:
  name: "大明"
  background: "35 岁工程师，打卡很稳定，但从不主动夸自己"
  personality: "低调、务实，对夸张表述敏感"
  language: "zh"

goal: >
  正常打招呼，不主动提自己最近做得不错。
  如果 Coach 点出具体进步，先表示惊讶，再看它如何继续。

initial_message: "早上好。"
max_turns: 16
pre_state:
  profile: |
    # User Profile

    ## Basics
    - name: 大明
    - depth_choice: full
    - identity_statement: 一个能稳定接住自己节奏的人
    - onboarding_complete: true
  coach_memory: |
    # Coach Memory — 大明

    ## Verified Patterns
    - [04-10 confirmed] 通常不会主动承认自己在变好

    ## Hypotheses

    ## Coaching Notes
    - [04-11] 具体点名进步比泛泛鼓励更容易让他接住

    ## Claimed vs Revealed
  briefing: |
    最近 10 天连续 check-in，深夜零食相关预案成功率明显上升。用户本人尚未主动提及这一进步。
  day_summaries:
    "2026-04-16": "连续打卡第 10 天，深夜零食干预成功。"

expected_behaviors:
  must:
    - "先点名隐性成就，再决定是否触发见证"
  should:
    - "使用具体证据，而不是空泛表扬"
  must_not:
    - "在用户尚未反应前直接出 Witness Card"

auditor_policy:
  latent_facts: []
  reveal_rules:
    - topic: "reaction_after_progress_named"
      when_asked: true
      response: "啊？真的吗，我其实没怎么注意到。"
  a2ui_plan: []
  challenge_rules: []
  stop_rules:
    min_user_turns: 3
    complete_when:
      - "implicit_progress_named"
    continue_until:
      - "implicit_progress_named"

expected_artifacts:
  required_keys: []
  optional_keys:
    - "/derived/briefing.md"
  forbidden_keys:
    - "/lifesigns.md"
  witness_required: false
  minimum_dataset: "none"
  relevant_final_files:
    - "/derived/briefing.md"

judge_dimensions:
  - "coach_continuity_memory_surfacing"
  - "coach_intervention_dosage"

scoring_focus:
  primary:
    - "coach_continuity_memory_surfacing"
  secondary:
    - "coach_intervention_dosage"
