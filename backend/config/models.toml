# ABOUTME: LLM 模型 profile 配置文件
# ABOUTME: 定义各场景使用的模型及其参数，支持环境变量插值

# 主 Coach Agent 使用 GPT-5.4
[models.coach]
model = "azure_openai:gpt-5.4"
azure_deployment = "gpt-5.4"
azure_endpoint = "${AZURE_OPENAI_ENDPOINT}"
api_key = "${AZURE_OPENAI_API_KEY}"
openai_api_version = "${AZURE_OPENAI_API_VERSION}"
# Intervention Composer Subagent 使用 GPT-5.4 Nano 组装干预 prompt
[models.intervention_composer]
model = "azure_openai:gpt-5.4-nano"
azure_deployment = "gpt-5.4-nano"
azure_endpoint = "${AZURE_OPENAI_ENDPOINT}"
api_key = "${AZURE_OPENAI_API_KEY}"
openai_api_version = "${AZURE_OPENAI_API_VERSION}"
