# ABOUTME: Docker Compose configuration for Voliti
# ABOUTME: Orchestrates backend (LangGraph) and frontend (Next.js) services

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "2024:2024"
    environment:
      # Google Gemini (required)
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      # LangSmith (optional, for tracing)
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY:-}
      - LANGSMITH_TRACING=${LANGSMITH_TRACING:-false}
      - LANGSMITH_ENDPOINT=${LANGSMITH_ENDPOINT:-https://api.smith.langchain.com}
      - LANGCHAIN_PROJECT=${LANGCHAIN_PROJECT:-voliti}
    volumes:
      # Mount prompts for hot reload during development
      - ./prompts:/app/prompts:ro
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:2024/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_LANGGRAPH_API_URL: http://backend:2024
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - NEXT_PUBLIC_LANGGRAPH_API_URL=http://backend:2024
    restart: unless-stopped

networks:
  default:
    name: voliti-network
